# DataPulse — Market Intelligence Pipeline
# Runs monthly: collects RSS feeds and extracts market signals via Claude API
# Can also be triggered manually from the GitHub Actions tab
#
# Retries: up to 5 attempts, 5 minutes apart. After the 5th failure, sends email
# (requires GitHub secrets: PIPELINE_ALERT_EMAIL, SMTP_HOST, SMTP_PORT,
# SMTP_USERNAME, SMTP_PASSWORD).

name: Market Intelligence Pipeline

on:
  schedule:
    # 1st of every month, 06:00 UTC.
    - cron: "0 6 1 * *"
  workflow_dispatch:

concurrency:
  group: market-intelligence

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    # Allow pushing the generated report back to the repo (GITHUB_TOKEN).
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          # Required so later git push can authenticate using the persisted token.
          persist-credentials: true
          # Full history so pull --rebase before push is reliable.
          fetch-depth: 0

      - name: 🐍 Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 📦 Install dependencies
        run: pip install -e .

      - name: 🔄 Run pipeline (retry on failure)
        id: pipeline_retry
        uses: nick-fields/retry@v3
        env:
          SUPABASE_DB_HOST: ${{ secrets.SUPABASE_DB_HOST }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_DB_USER: ${{ secrets.SUPABASE_DB_USER }}
          SUPABASE_DB_NAME: ${{ secrets.SUPABASE_DB_NAME }}
          SUPABASE_DB_PORT: ${{ secrets.SUPABASE_DB_PORT }}
        with:
          timeout_minutes: 25
          max_attempts: 5
          retry_wait_seconds: 300
          shell: bash
          command: bash scripts/ci_market_pipeline.sh

      # Pull --rebase before push so concurrent commits on main do not reject the bot push.
      - name: Commit report to repository
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 5
          retry_wait_seconds: 60
          shell: bash
          command: bash scripts/ci_commit_report.sh

      # action-send-mail requires a non-empty to/cc/bcc; skip when alert secrets are missing.
      - name: Check pipeline alert email configured
        if: failure()
        id: alert_email
        env:
          PIPELINE_ALERT_EMAIL: ${{ secrets.PIPELINE_ALERT_EMAIL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: |
          set -euo pipefail
          missing=()
          [ -z "${PIPELINE_ALERT_EMAIL}" ] && missing+=("PIPELINE_ALERT_EMAIL")
          [ -z "${SMTP_HOST}" ] && missing+=("SMTP_HOST")
          [ -z "${SMTP_USERNAME}" ] && missing+=("SMTP_USERNAME")
          [ -z "${SMTP_PASSWORD}" ] && missing+=("SMTP_PASSWORD")
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Pipeline alert email skipped — set Actions secrets: ${missing[*]}. See docs/deploy-checklist.md."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: 📧 Email alert after failed attempts
        if: failure() && steps.alert_email.outputs.configured == 'true'
        continue-on-error: true
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          secure: true
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "DataPulse pipeline failed after 5 attempts"
          to: ${{ secrets.PIPELINE_ALERT_EMAIL }}
          from: DataPulse Bot <${{ secrets.SMTP_USERNAME }}>
          body: |
            The Market Intelligence Pipeline failed all 5 attempts
            (5 minutes between attempts).

            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            Trigger: ${{ github.event_name }}

            Check the workflow logs for the failing step (pipeline, commit/push, or email).
