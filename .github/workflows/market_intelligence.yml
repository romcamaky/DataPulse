# DataPulse — Market Intelligence Pipeline
# Runs biweekly: collects RSS feeds and extracts market signals via Claude API
# Can also be triggered manually from the GitHub Actions tab

name: Market Intelligence Pipeline

on:
  schedule:
    # Every Sunday 06:00 UTC; biweekly gating is applied in the "Check biweekly schedule" step
    - cron: "0 6 * * 0"
  workflow_dispatch:

concurrency:
  group: market-intelligence

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Allow pushing the generated report back to the repo (GITHUB_TOKEN).
    permissions:
      contents: write

    steps:
      # Manual runs always execute. Scheduled runs only on even ISO week numbers (W01 skips, W02 runs, …).
      - name: 📅 Check biweekly schedule
        id: biweekly
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Manual workflow_dispatch — running full pipeline (week check skipped)."
            exit 0
          fi
          WEEK=$(date -u +%V)
          YEAR=$(date -u +%Y)
          echo "Current date (UTC): $(date -u '+%Y-%m-%d %H:%M:%S'), ISO week: $WEEK ($YEAR)"
          # Even ISO weeks: run pipeline. Odd weeks: skip (biweekly on a weekly cron).
          if [ $((10#$WEEK % 2)) -eq 0 ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Biweekly run week (even ISO week $WEEK) — continuing."
          else
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping — not a biweekly run week."
          fi

      - name: 📥 Checkout repository
        if: steps.biweekly.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          # Required so later git push can authenticate using the persisted token.
          persist-credentials: true

      - name: 🐍 Set up Python 3.12
        if: steps.biweekly.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 📦 Install dependencies
        if: steps.biweekly.outputs.skip != 'true'
        run: pip install -e .

      - name: 📡 Collect RSS feeds
        if: steps.biweekly.outputs.skip != 'true'
        continue-on-error: true
        run: python -m datapulse.collector

      - name: 🧠 Extract market signals
        if: steps.biweekly.outputs.skip != 'true'
        run: python -m datapulse.extractor

      - name: 🔄 Run dbt models
        if: steps.biweekly.outputs.skip != 'true'
        env:
          SUPABASE_DB_HOST: ${{ secrets.SUPABASE_DB_HOST }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_DB_USER: ${{ secrets.SUPABASE_DB_USER }}
          SUPABASE_DB_NAME: ${{ secrets.SUPABASE_DB_NAME }}
          SUPABASE_DB_PORT: ${{ secrets.SUPABASE_DB_PORT }}
        run: |
          pip install dbt-postgres
          cd dbt
          dbt run
          dbt test

      # Writes docs/reports/YYYY-MM-DD.md via Supabase (same credentials as local dev).
      - name: Generate career intelligence report
        if: steps.biweekly.outputs.skip != 'true'
        continue-on-error: false
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m datapulse.report

      # Stage and commit only when the report file changed; push uses the Actions token from checkout.
      - name: Commit report to repository
        if: steps.biweekly.outputs.skip != 'true'
        env:
          # Built-in token — do not create a repo secret named GITHUB_TOKEN.
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git config user.name "DataPulse Bot"
          git config user.email "datapulse-bot@users.noreply.github.com"
          git add docs/reports/
          git diff --staged --quiet || git commit -m "chore: weekly career intelligence report $(date -u +%Y-%m-%d) [skip ci]"
          git push
