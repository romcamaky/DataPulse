# DataPulse — Market Intelligence Pipeline
# Runs biweekly: collects RSS feeds and extracts market signals via Claude API
# Can also be triggered manually from the GitHub Actions tab
#
# Retries: up to 5 attempts, 5 minutes apart. After the 5th failure, sends email
# (requires GitHub secrets: PIPELINE_ALERT_EMAIL, SMTP_HOST, SMTP_PORT,
# SMTP_USERNAME, SMTP_PASSWORD).

name: Market Intelligence Pipeline

on:
  schedule:
    # Every Sunday 06:00 UTC; biweekly gating is applied in the "Check biweekly schedule" step
    - cron: "0 6 * * 0"
  workflow_dispatch:

concurrency:
  group: market-intelligence

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    # Allow pushing the generated report back to the repo (GITHUB_TOKEN).
    permissions:
      contents: write

    steps:
      # Manual runs always execute. Scheduled runs only on even ISO week numbers (W01 skips, W02 runs, …).
      - name: 📅 Check biweekly schedule
        id: biweekly
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Manual workflow_dispatch — running full pipeline (week check skipped)."
            exit 0
          fi
          WEEK=$(date -u +%V)
          YEAR=$(date -u +%Y)
          echo "Current date (UTC): $(date -u '+%Y-%m-%d %H:%M:%S'), ISO week: $WEEK ($YEAR)"
          # Even ISO weeks: run pipeline. Odd weeks: skip (biweekly on a weekly cron).
          if [ $((10#$WEEK % 2)) -eq 0 ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Biweekly run week (even ISO week $WEEK) — continuing."
          else
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping — not a biweekly run week."
          fi

      - name: 📥 Checkout repository
        if: steps.biweekly.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          # Required so later git push can authenticate using the persisted token.
          persist-credentials: true
          # Full history so pull --rebase before push is reliable.
          fetch-depth: 0

      - name: 🐍 Set up Python 3.12
        if: steps.biweekly.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 📦 Install dependencies
        if: steps.biweekly.outputs.skip != 'true'
        run: pip install -e .

      - name: 🔄 Run pipeline (retry on failure)
        if: steps.biweekly.outputs.skip != 'true'
        id: pipeline_retry
        uses: nick-fields/retry@v3
        env:
          SUPABASE_DB_HOST: ${{ secrets.SUPABASE_DB_HOST }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_DB_USER: ${{ secrets.SUPABASE_DB_USER }}
          SUPABASE_DB_NAME: ${{ secrets.SUPABASE_DB_NAME }}
          SUPABASE_DB_PORT: ${{ secrets.SUPABASE_DB_PORT }}
        with:
          timeout_minutes: 25
          max_attempts: 5
          retry_wait_seconds: 300
          shell: bash
          command: bash scripts/ci_market_pipeline.sh

      # Pull --rebase before push so concurrent commits on main do not reject the bot push.
      - name: Commit report to repository
        if: steps.biweekly.outputs.skip != 'true'
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 5
          retry_wait_seconds: 60
          shell: bash
          command: bash scripts/ci_commit_report.sh

      - name: 📧 Email alert after failed attempts
        if: failure() && steps.biweekly.outputs.skip != 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          secure: true
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "DataPulse pipeline failed after 5 attempts"
          to: ${{ secrets.PIPELINE_ALERT_EMAIL }}
          from: DataPulse Bot <${{ secrets.SMTP_USERNAME }}>
          body: |
            The Market Intelligence Pipeline failed all 5 attempts
            (5 minutes between attempts).

            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            Trigger: ${{ github.event_name }}

            Check the workflow logs for the failing step (pipeline, commit/push, or email).
