version: 2

models:
  - name: stg_skills
    description: Canonical skills reference (staging)
    columns:
      - name: id
        tests:
          - unique
          - not_null
      - name: name
        tests:
          - unique
          - not_null

  - name: stg_user_profiles
    description: User profile subset for analytics (staging)
    columns:
      - name: id
        tests:
          - unique
          - not_null

  - name: stg_user_skills
    description: User self-assessed skills (staging)
    columns:
      - name: id
        tests:
          - unique
          - not_null
      - name: user_id
        tests:
          - not_null
      - name: skill_id
        tests:
          - not_null
      - name: level
        tests:
          - not_null
          - accepted_values:
              values: [0, 1, 2, 3, 4, 5]

  - name: stg_user_target_roles
    description: Target roles per user (staging)
    columns:
      - name: id
        tests:
          - unique
          - not_null
      - name: user_id
        tests:
          - not_null
      - name: role_name
        tests:
          - not_null

  - name: stg_feed_items
    description: Raw RSS articles with recency helper (staging)
    columns:
      - name: id
        tests:
          - unique
          - not_null
      - name: url
        tests:
          - unique
          - not_null
      - name: source_key
        tests:
          - not_null

  - name: stg_market_signals
    description: Extracted market signals from feed items (staging)
    columns:
      - name: id
        tests:
          - unique
          - not_null
      - name: feed_item_id
        tests:
          - not_null
      - name: signal_type
        tests:
          - not_null
          - accepted_values:
              values:
                - skill_demand
                - tool_adoption
                - trend_emerging
                - trend_declining
                - regulatory_update
      - name: strength
        tests:
          - not_null
          - accepted_values:
              values: [1, 2, 3, 4, 5]
      - name: confidence
        tests:
          - not_null
          - accepted_values:
              values: [1, 2, 3, 4, 5]
